<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>피클볼 용어 사전</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f0f4fa;color:#1a1a2e;font-size:15px;line-height:1.6}

.cover{background:linear-gradient(145deg,#0D3D6B 0%,#1A5EA8 60%,#2980c4 100%);color:#fff;padding:36px 24px 28px;text-align:center;position:relative;overflow:hidden}
.cover::before{content:'📖';font-size:80px;position:absolute;top:-10px;right:-10px;opacity:.1}
.cover h1{font-size:24px;font-weight:800;margin-bottom:4px}
.cover h2{font-size:13px;font-weight:400;opacity:.85;margin-bottom:18px}
.cover .total{display:inline-block;background:rgba(255,255,255,.18);border-radius:20px;padding:6px 16px;font-size:13px;font-weight:600}

/* SEARCH */
.search-wrap{padding:14px 16px;background:#fff;border-bottom:1px solid #e8edf5;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.search-box{display:flex;align-items:center;gap:10px;background:#f1f5f9;border-radius:12px;padding:10px 14px}
.search-box input{border:none;background:transparent;font-size:14px;width:100%;outline:none;color:#1a1a2e}
.search-box input::placeholder{color:#94a3b8}
.search-icon{color:#94a3b8;font-size:16px;flex-shrink:0}
.search-clear{color:#94a3b8;font-size:18px;cursor:pointer;flex-shrink:0;display:none}

/* CATEGORY TABS */
.tabs{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;background:#fff;border-bottom:1px solid #e8edf5}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid #e2e8f0;color:#64748b;background:#fff;transition:all .2s}
.tab.active{background:#0D3D6B;color:#fff;border-color:#0D3D6B}

/* RESULT COUNT */
.result-info{padding:10px 16px;font-size:12px;color:#94a3b8;background:#f8fafc;border-bottom:1px solid #e8edf5}

/* TERMS */
.section{margin:12px 16px}
.section-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:0 2px}
.section-emoji{font-size:18px}
.section-title{font-size:14px;font-weight:700;color:#0D3D6B}
.section-count{font-size:11px;color:#94a3b8;margin-left:auto}

.term-card{background:#fff;border-radius:14px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;transition:box-shadow .2s}
.term-card:active{box-shadow:0 2px 8px rgba(26,94,168,.2)}
.term-header{display:flex;align-items:center;gap:10px;padding:13px 16px}
.term-badge{flex-shrink:0;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.term-name-wrap{flex:1;min-width:0}
.term-name{font-size:15px;font-weight:700;color:#1a1a2e}
.term-eng{font-size:12px;color:#94a3b8;margin-top:1px}
.term-arrow{color:#cbd5e1;font-size:14px;transition:transform .2s;flex-shrink:0}
.term-card.open .term-arrow{transform:rotate(90deg)}
.term-body{display:none;padding:0 16px 14px;border-top:1px solid #f1f5f9}
.term-card.open .term-body{display:block}
.term-desc{font-size:13px;color:#334155;line-height:1.7;margin-top:10px}
.term-example{background:#EBF4FC;border-radius:8px;padding:9px 12px;margin-top:8px;font-size:12px;color:#0D3D6B;line-height:1.6}
.term-example::before{content:'💡 예시  ';font-weight:700}
.term-tip{background:#E6F4ED;border-radius:8px;padding:9px 12px;margin-top:6px;font-size:12px;color:#1A7A4A;line-height:1.6}
.term-tip::before{content:'✅ 핵심  ';font-weight:700}
.term-level{display:inline-flex;align-items:center;gap:4px;margin-top:8px;font-size:11px;padding:3px 8px;border-radius:10px;font-weight:600}
.lv-basic{background:#E6F4ED;color:#1A7A4A}
.lv-mid{background:#EBF4FC;color:#1A5EA8}
.lv-hard{background:#FFF0E6;color:#C05000}
.lv-pro{background:#f3e8ff;color:#7C3CB8}

.no-result{text-align:center;padding:48px 24px;color:#94a3b8}
.no-result .icon{font-size:40px;margin-bottom:12px}

.footer{background:#0D3D6B;color:#fff;text-align:center;padding:24px 20px;margin-top:16px}
.footer p{font-size:12px;opacity:.7;margin:3px 0}
</style>
</head>
<body>

<div class="cover">
  <h1>📖 피클볼 용어 사전</h1>
  <h2>레벨 진단 체크리스트 수록 용어 완전 정복</h2>
  <div class="total" id="totalCount">총 0개 용어</div>
</div>

<div class="search-wrap">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="용어 검색... (예: 딩크, 키친, 서브)" oninput="onSearch()">
    <span class="search-clear" id="clearBtn" onclick="clearSearch()">✕</span>
  </div>
</div>

<div class="tabs" id="tabs">
  <div class="tab active" onclick="filterCat('all', this)">전체</div>
  <div class="tab" onclick="filterCat('rule', this)">📖 규칙</div>
  <div class="tab" onclick="filterCat('move', this)">🏃 움직임</div>
  <div class="tab" onclick="filterCat('shot', this)">🎯 샷</div>
  <div class="tab" onclick="filterCat('kitchen', this)">🍳 키친</div>
  <div class="tab" onclick="filterCat('volley', this)">⚡ 발리</div>
  <div class="tab" onclick="filterCat('tactic', this)">🧠 전술</div>
  <div class="tab" onclick="filterCat('advanced', this)">🌟 고급</div>
  <div class="tab" onclick="filterCat('rating', this)">📊 등급</div>
</div>

<div class="result-info" id="resultInfo"></div>
<div id="termList"></div>

<div class="footer">
  <p>🏓 피클볼 완전 정복 시리즈</p>
  <p>레벨 자가진단표와 함께 활용하세요</p>
</div>

<script>

  {cat:'rule', emoji:'📏', name:'두 번 바운드 규칙', eng:'Two-Bounce Rule / Double Bounce Rule',

  {cat:'rule', emoji:'📏', name:'렛 (Let)', eng:'Let',

let currentCat = 'all';
let currentSearch = '';

function render() {
  const list = document.getElementById('termList');
  let filtered = terms.filter(t => {
    const catOk = currentCat === 'all' || t.cat === currentCat;
    const q = currentSearch.toLowerCase();
    const searchOk = !q || t.name.toLowerCase().includes(q) || (t.eng && t.eng.toLowerCase().includes(q)) || t.desc.toLowerCase().includes(q);
    return catOk && searchOk;
  });

  document.getElementById('resultInfo').textContent =
    currentSearch ? `"${currentSearch}" 검색 결과: ${filtered.length}개` :
    currentCat === 'all' ? `전체 ${filtered.length}개 용어` : `${filtered.length}개 용어`;

  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-result"><div class="icon">🔍</div><p>검색 결과가 없습니다.</p></div>';
    return;
  }

  // Group by category if all
  if (currentCat === 'all' && !currentSearch) {
    const cats = [
      {key:'rule', title:'규칙 & 기본 개념', emoji:'📖'},
      {key:'move', title:'움직임 & 포지셔닝', emoji:'🏃'},
      {key:'shot', title:'기본 샷 기술', emoji:'🎯'},
      {key:'kitchen', title:'키친 게임 (소프트 게임)', emoji:'🍳'},
      {key:'volley', title:'발리 & 스매시', emoji:'⚡'},
      {key:'tactic', title:'전술 & 고급 기술', emoji:'🧠'},
      {key:'advanced', title:'피클볼 문화 & 슬랭', emoji:'🌟'},
      {key:'rating', title:'실력 등급 시스템', emoji:'📊'},
    ];
    let html = '';
    cats.forEach(c => {
      const items = filtered.filter(t => t.cat === c.key);
      if (!items.length) return;
      html += `<div class="section"><div class="section-header"><span class="section-emoji">${c.emoji}</span><span class="section-title">${c.title}</span><span class="section-count">${items.length}개</span></div>`;
      items.forEach((t,i) => html += renderCard(t, c.key+'-'+i));
      html += '</div>';
    });
    list.innerHTML = html;
  } else {
    let html = '<div class="section">';
    filtered.forEach((t,i) => html += renderCard(t, 'f-'+i));
    html += '</div>';
    list.innerHTML = html;
  }

  document.getElementById('totalCount').textContent = '총 ' + terms.length + '개 용어';
}

function renderCard(t, id) {
  const lvMap = {basic:'기초',mid:'초중급',hard:'중상급',pro:'고급'};
  const lvClass = {basic:'lv-basic',mid:'lv-mid',hard:'lv-hard',pro:'lv-pro'};
  return `<div class="term-card" id="card-${id}" onclick="toggleCard('${id}')">
    <div class="term-header">
      <div class="term-badge">${t.emoji}</div>
      <div class="term-name-wrap">
        <div class="term-name">${t.name}</div>
        ${t.eng ? `<div class="term-eng">${t.eng}</div>` : ''}
      </div>
      <span class="term-arrow">▶</span>
    </div>
    <div class="term-body">
      <div class="term-desc">${t.desc}</div>
      ${t.example ? `<div class="term-example">${t.example}</div>` : ''}
      ${t.tip ? `<div class="term-tip">${t.tip}</div>` : ''}
      ${t.level ? `<span class="term-level ${lvClass[t.level]}">${lvMap[t.level]} 수준</span>` : ''}
    </div>
  </div>`;
}

function toggleCard(id) {
  const card = document.getElementById('card-'+id);
  card.classList.toggle('open');
}

function filterCat(cat, el) {
  currentCat = cat;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
  window.scrollTo(0, 0);
}

function onSearch() {
  const q = document.getElementById('searchInput').value;
  currentSearch = q;
  document.getElementById('clearBtn').style.display = q ? 'block' : 'none';
  if (q) { currentCat = 'all'; document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.querySelector('.tab').classList.add('active'); }
  render();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  currentSearch = '';
  document.getElementById('clearBtn').style.display = 'none';
  render();
}

render();
</script>
